services:
  - type: web
    name: comparador-nombres
    runtime: python
    rootDir: web_app_nombres
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: comparador-nombres-db
          property: connectionString

databases:
  - name: comparador-nombres-db
    plan: basic-256mb
